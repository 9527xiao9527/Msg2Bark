# =========================================================
# 短信/电话 转发器配置文件
# 修改本文件后即时生效，无需重启！
# =========================================================

# --- 数据库路径 (一般不需要改) ---
msg_db_path=/data/data/com.android.providers.telephony/databases/mmssms.db
call_db_path=/data/data/com.android.providers.contacts/databases/calllog.db

# --- Bark 推送设置 (iOS 推荐) ---
# 0=关闭, 1=开启
bark_switch=0
# Bark 服务器地址
bark_url=https://api.day.app/push
# 【必填】Bark 设备密钥 (在 iOS App 中查看)
device_key=

# --- 企业微信/微信群机器人设置 ---
# 0=关闭, 1=开启
wx_switch=0
# 【必填】Webhook 地址 (企业微信机器人或桥接服务)
wx_webhook=

# --- WxPusher 设置 (微信公众号推送) ---
# 0=关闭, 1=开启
wxpusher=0
# 【必填】AppToken (在 wxpusher.zjiecode.com 获取)
wxpusher_token=
# 主题 ID (留空则使用默认值 39910)
wxpusher_topic=

# --- 其他设置 ---
# 开始监控的时间点 (格式 YYYY-MM-DD)，避免推送历史消息
# 建议设置为当前日期
startTime=2026-03-15

# --- SIM 卡槽映射 ---
# SIM 卡自定义备注名，显示在推送消息中
sim1_name=
sim2_name=
# 用于识别来电卡槽，不知道的可以看推送
sim1_imei=
sim2_imei=
